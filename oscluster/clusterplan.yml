controller-1.openstack.local:
 image: ubuntu2404
 memory: 65536
 numcpus: 10
 pool: default
 disks: 
  - size: 100
    interface: scsi
  - size: 100
    interface: scsi
 nets:
  - name: management
    ip: 10.0.123.11
    mask: 255.255.255.0
    gateway: 10.0.123.1
    dns: 8.8.8.8
  - name: service
    noconf: true
 cmds:
  - sudo apt update && sudo apt upgrade -y
  - sudo apt install -y chrony rsyslog iputils-ping nfs-common
  - sudo systemctl enable --now chrony rsyslog

